apiVersion: apps/v1
kind: Deployment
metadata:
  name: green-deployment
  labels:
    app: myapp
    version: green
spec:
  replicas: 3
  selector:
    matchLabels:
      app: myapp
      version: green
  template:
    metadata:
      labels:
        app: myapp
        version: green
    spec:
      containers:
      - name: myapp
        image: saiy8077/myapp:d625c1858de9b25880d3e1b8e46ecf9bac451481  # ← new image
        ports:
        - containerPort: 8080
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10